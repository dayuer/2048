name: Game2048
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "L9YRXEKYN2"
    CODE_SIGN_STYLE: Automatic
targets:
  Game2048:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayuer.above
        CODE_SIGN_ENTITLEMENTS: Sources/App/Game2048.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: "2048"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  Game2048Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Game2048
schemes:
  Game2048:
    build:
      targets:
        Game2048: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Game2048Tests
